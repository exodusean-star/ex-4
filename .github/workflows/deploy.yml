name: nginx-deployment SSM and S3 #title

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to aws
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: aws자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: s3버킷으로 파일 업로드
        run: |
          aws s3 sync html s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete

      - name: deploy from s3 to ec2 using SSM
        run: |
          aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[
              \"sudo aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html/ /usr/share/nginx/html/ --delete\",
              \"sudo chown -R ec2-user:nginx /usr/share/nginx/html/\",
              \"sudo chmod 644 /usr/share/nginx/html/index.html\",
              \"sudo systemctl reload nginx\"
          ]" \
          --comment "Deploy files from S3 to EC2 and restart Nginx" \
          --timeout-seconds 600 \
          --region ${{ secrets.AWS_REGION }}